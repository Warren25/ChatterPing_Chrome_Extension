<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatterPing</title>
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="../config/config.js"></script>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">📡</div>
                <h1>ChatterPing</h1>
            </div>
            <div class="sync-indicator" id="sync-indicator">
                <div class="sync-dot"></div>
                <span>Live</span>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="summary">Summary</button>
            <button class="tab-btn" data-tab="details">Details</button>
            <button class="tab-btn" data-tab="settings">Settings</button>
        </div>

        <!-- Tab Content -->
        <div class="tab-content">
            <!-- Summary Tab -->
            <div class="tab-pane active" id="tab-summary">
                <div class="keyword-selector" id="summary-keyword-selector"></div>

                <div class="stats-card">
                    <div class="stat-item">
                        <div class="stat-number" id="badge">0</div>
                        <div class="stat-label">New Mentions</div>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <div class="stat-number" id="today-count">0</div>
                        <div class="stat-label">Today</div>
                    </div>
                </div>

                <div class="summary-card">
                    <div class="summary-header">
                        <h3>AI Summary</h3>
                        <div class="summary-badge" id="keyword-badge">Loading...</div>
                    </div>
                    <div class="summary-content" id="summary">
                        <div class="loading-spinner"></div>
                        <p>Loading summary...</p>
                    </div>
                </div>
            </div>

            <!-- Details Tab -->
            <div class="tab-pane" id="tab-details">
                <div class="keyword-selector" id="details-keyword-selector"></div>
                <div id="details-loading" class="details-loading">
                    <div class="spinner"></div>
                    <p>Loading mentions...</p>
                </div>
                <div id="details-content" style="display: none;">
                    <div class="details-stats">
                        <div class="details-stat">
                            <span class="details-stat-number" id="totalCount">0</span>
                            <span class="details-stat-label">mentions</span>
                        </div>
                        <div class="details-stat">
                            <span class="details-stat-number" id="details-keyword">—</span>
                            <span class="details-stat-label">keyword</span>
                        </div>
                    </div>
                    <div class="mentions-list" id="mentionsList">
                        <!-- Mentions will be populated here -->
                    </div>
                </div>
                <div id="details-error" class="details-error" style="display: none;">
                    <p>Unable to load mentions</p>
                    <button class="btn btn-primary" id="retry-details-btn">Retry</button>
                </div>
            </div>

            <!-- Settings Tab -->
            <div class="tab-pane" id="tab-settings">
                <div id="settings-status" class="status-message"></div>

                <form id="settings-form">
                    <div class="form-group">
                        <label>Target Keywords <small class="keyword-count" id="keyword-count">(0/5)</small></label>
                        <div class="keyword-chips" id="keyword-chips"></div>
                        <div class="keyword-add-row">
                            <input type="text" id="keyword-input" name="keyword" placeholder="e.g., Your Brand" maxlength="50">
                            <button type="button" class="btn btn-primary btn-add-keyword" id="add-keyword-btn">Add</button>
                        </div>
                        <small>Add up to 5 keywords or brand names to monitor</small>
                    </div>

                    <div class="form-group">
                        <label for="checkInterval">Check Interval</label>
                        <select id="checkInterval" name="checkInterval">
                            <option value="5">Every 5 minutes</option>
                            <option value="15">Every 15 minutes</option>
                            <option value="30">Every 30 minutes</option>
                            <option value="60">Every hour</option>
                        </select>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="notifications" name="notifications" checked>
                        <label for="notifications">Desktop notifications</label>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="autoSummary" name="autoSummary" checked>
                        <label for="autoSummary">Auto AI summaries</label>
                    </div>

                    <div class="button-group">
                        <button type="button" class="btn btn-secondary" id="resetBtn">Reset</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="app-version" id="app-version">Version --</div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
